# ============================================================================
#  실측값 모음 — 차에서 잰 숫자를 전부 여기에 적는다.
#
#  코드는 건드리지 않는다. 이 파일 하나만 고치면 된다.
#
#  쓰는 법:
#     ros2 run <패키지> <노드> --ros-args --params-file config/calibration.yaml
#
#  예:
#     ros2 run decision_making_pkg parking_controller_node \
#         --ros-args --params-file config/calibration.yaml
#
#  [주의] 아래 노드 이름(예: parking_controller_node)이 실제 노드 이름과 정확히
#         같아야 값이 먹는다. 오타가 나면 조용히 무시되고 기본값이 쓰인다.
#
#  값이 먹었는지 확인:
#     ros2 param get /parking_controller_node speed_to_mps
#
#  측정 절차는 docs/CALIBRATION.md 참고 (단계별로 적어뒀다).
# ============================================================================


# ────────────────────────────────────────────────────────────────────────────
# 주차 (docs/CALIBRATION.md 1~3, 7, 8단계)
# ────────────────────────────────────────────────────────────────────────────
parking_controller_node:
  ros__parameters:

    # [1단계] 바퀴가 어느 쪽으로 꺾이나. 반대로 꺾이면 "left"로 바꾼다.
    slot_side: "right"                # 측정: __________

    # [2단계] 모터가 실제로 구르기 시작하는 최소 세기 (PWM)
    min_move_speed: 45                # 측정: __________

    # [3단계] 가장 중요. PWM 1당 실제 속도 [m/s].
    #   재는 법: 후진 PWM 70으로 정확히 3초 굴리고 → 거리 ÷ (70 × 3)
    #   이 값이 틀리면 눈감고 가는 구간이 전부 틀어진다 (덜 들어가거나 선을 넘는다).
    speed_to_mps: 0.003               # 측정: __________

    # [7단계] 뒷선이 범퍼 밑으로 사라지기 시작하는 거리 [m].
    #   재는 법: 천천히 후진하며 /parking_rear_distance가 끊기는 순간의 실제 거리.
    #   [중요] 잰 값보다 조금 크게 적을 것 (22cm 나왔으면 0.30).
    #          딱 맞추면 정상 주차를 고장으로 오해해서 멈춘다.
    blind_enter_dist: 0.30            # 측정: __________

    # 뒷선을 한 번도 못 본 채 후진할 수 있는 최대 거리 [m].
    #   [주의] 반드시 **주차칸 깊이보다 짧게**. 안 그러면 칸을 뚫고 나간다.
    #   [주의] 동시에 옆차 가림이 풀릴 때까지 갈 거리보다는 길어야 한다.
    blind_search_max_dist: 0.50       # 주차칸 깊이: ______ → 이 값: ______

    # 눈감고 마무리한 뒤 뒷선까지 남길 여유 [m]
    blind_final_gap: 0.05             # 측정: __________

    # [8단계] 주차 시퀀스
    align_duration: 1.0               # 주차칸을 얼마나 지나쳐 멈출지 [s]
    align_speed: 60
    reverse_speed: 70
    turn_duration: 2.5                # 핸들 최대로 꺾고 후진해서 90도 도는 시간 [s]
                                      #  주차 정확도를 좌우한다. 마지막에 0.5s씩 스윕.
    parking_stop_dist: 0.10           # 이 거리에서 완전 정지 [m]
    parking_slow_dist: 0.40           # 이 거리부터 감속 [m]
    parking_timeout: 25.0             # 전체 제한시간 [s]


# ────────────────────────────────────────────────────────────────────────────
# 후방 카메라 = 주차의 눈 (docs/CALIBRATION.md 6단계)
# ────────────────────────────────────────────────────────────────────────────
rear_park_detector_node:
  ros__parameters:

    # 버드아이뷰 4점. 바닥에 테이프로 직사각형 만들고 그 네 꼭짓점의 화면 좌표.
    #   순서: 좌상, 우상, 우하, 좌하 → [x1,y1, x2,y2, x3,y3, x4,y4]
    #   지금 값은 전방 카메라용을 임시로 옮긴 것 — **반드시 후방으로 다시 잡을 것.**
    src_mat: [160.0, 180.0, 480.0, 180.0, 640.0, 400.0, 0.0, 400.0]   # 측정: __________

    # 펴진 화면에서 세로 1픽셀이 실제 몇 m인가.
    #   재는 법: 위 직사각형의 실제 세로 길이 ÷ 펴진 화면에서의 픽셀 높이
    m_per_px: 0.0022                  # 측정: __________

    # 렌즈에서 뒤범퍼 끝까지의 거리 [m]. 거리를 '범퍼 기준'으로 만든다.
    cam_offset_m: 0.10                # 측정: __________

    # 옆차 가림을 피해 훑는 중앙 띠 폭 (화면 폭 대비 비율).
    #   옆차가 뒷선을 많이 가리면 좁히고, 뒷선을 자주 놓치면 넓힌다.
    center_band: 0.34

    # 흰 선 판정. 바닥이 밝거나 조명이 어두우면 조정.
    white_min: 170
    sat_max: 90

    # 옆차 = 바닥 밝기의 이 배율보다 어두운 열.
    #   절대 밝기가 아니라 상대값이라 조명이 바뀌어도 웬만하면 버틴다.
    side_darker_than: 0.75
    min_side_cols: 20
    min_slot_cols: 60                 # 두 차 사이가 이만큼은 열려 있어야 '칸'


# ────────────────────────────────────────────────────────────────────────────
# 장애물 회피 = 차선 변경 (docs/CALIBRATION.md 9단계) — 미션 1
# ────────────────────────────────────────────────────────────────────────────
obstacle_avoider_node:
  ros__parameters:

    # 어느 게 지금 달리는 차선인가. 모델 학습 때 정해진 거라 화면 보고 확인해야 한다.
    home_lane: "lane2"                # 확인: __________
    other_lane: "lane1"               # 확인: __________

    obstacle_class: "car"             # 모델에 이미 있는 클래스 (바꿀 일 없음)

    # 장애물이 얼마나 가까워지면 피할지.
    #   화면에서 장애물 상자의 '아래변'이 이 픽셀보다 아래로 오면 회피 시작.
    #   값이 크면 더 가까이 붙어서 피한다(늦게 피함).
    trigger_y: 300                    # 측정: __________

    # 어디까지를 '내 차선'으로 볼지 [px]. 화면 중앙에서 좌우로.
    #   [주의] 옆 차선 차를 자꾸 피하려 들면 이 값을 줄인다.
    lane_half_width: 120              # 측정: __________

    # 피한 뒤 얼마나 더 가고 돌아올지 [m].
    #   [주의] 장애물이 화면에서 사라졌다고 바로 돌아오면 **옆구리를 긁는다.**
    #   차 길이 + 여유로 잡을 것.
    pass_clearance_m: 0.40            # 차 길이: ______ → 이 값: ______

    min_score: 0.4                    # YOLO 신뢰도 하한
    trigger_frames: 3                 # 이만큼 연속 보여야 회피 시작 (오검출 방어)
    clear_frames: 5                   # 이만큼 연속 안 보여야 '지나갔다'

    # 주차와 **같은 값**을 넣는다 (거리 추정에 쓰는 환산상수).
    speed_to_mps: 0.003               # ↑ parking_controller_node 와 동일하게


# ────────────────────────────────────────────────────────────────────────────
# 신호등 (docs/CALIBRATION.md 10단계)
# ────────────────────────────────────────────────────────────────────────────
traffic_light_detector_node:
  ros__parameters:

    # 램프(동그란 불)가 화면에서 몇 픽셀 넓이로 보이나. 사실상 이 둘만 재면 된다.
    min_area: 60                      # 측정: __________
    max_area: 8000                    # 측정: __________

    roi_bottom: 0.6                   # 신호등이 화면 위쪽 몇 %에 걸리나
    val_min: 180                      # 점등부 밝기 하한. 흐린 날 낮춘다.
    consec_frames: 3                  # 이만큼 연속 같은 색이어야 확정

    # [주의] max_area를 키우거나 val_min을 낮췄으면 **반드시** 아래를 다시 돌릴 것:
    #      python3 scripts/traffic_light_eval.py
    #   "오검출 0"이 안 나오면 빨간 자판기/주황 기둥을 빨간불로 착각한다.


# ────────────────────────────────────────────────────────────────────────────
# 전방 카메라 = 차선 인식 (docs/CALIBRATION.md 4단계)
# ────────────────────────────────────────────────────────────────────────────
lane_info_extractor_node:
  ros__parameters:

    # 버드아이뷰 4점 — 비스듬히 보이는 도로를 위에서 내려다본 것처럼 편다.
    #   지금 값은 **원본 팀 카메라 기준**이라 우리 카메라로 100% 다시 잡아야 한다.
    #   재는 법: show_image:=true 로 켜고 `lane2_bird_img` 창에서
    #            **차선이 세로로 곧게** 보일 때까지 네 점을 조정.
    #   순서: 좌상, 우상, 우하, 좌하 → [x1,y1, x2,y2, x3,y3, x4,y4]
    src_mat: [238.0, 316.0, 402.0, 313.0, 501.0, 476.0, 155.0, 476.0]   # 측정: __________

    cutting_idx: 250                  # 펴진 화면에서 위쪽 몇 px을 버릴지 (멀리는 안 본다)
    lane_width: 300                   # [px] [주의] cm 아님. 한쪽 차선만 보일 때 반대쪽까지의 거리 추정
    detection_thickness: 10           # 차선 중앙을 찾을 때 훑는 띠 두께 [px]

    target_lane: "lane2"              # 기본으로 따라갈 차선 (회피 노드가 바꿔준다)
    show_image: false                 # [주의] 캘리브레이션할 때만 true.
                                      #  평소 true면 매 프레임 비용 + 이미지 토픽이 DDS를
                                      #  한 벌 더 흘려서 프레임 유실을 유발한다.


# ────────────────────────────────────────────────────────────────────────────
# 경로 계획 (docs/CALIBRATION.md 4단계)
# ────────────────────────────────────────────────────────────────────────────
path_planner_node:
  ros__parameters:
    # 영상에서 '앞범퍼 중심'이 찍히는 픽셀 좌표. 경로의 시작점이 된다.
    car_center_point: [320, 179]      # 측정: __________
